# Gzip compression (reduces JS/CSS transfer by ~70%)
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types
    text/plain text/css text/xml text/javascript
    application/json application/javascript application/xml
    application/rss+xml font/truetype font/opentype
    application/vnd.ms-fontobject image/svg+xml;

server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # index.html — never cache (SPA entry point must always be fresh)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires 0;
    }

    # SPA fallback — all unmatched routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API to backend (BACKEND_URL set at container start via entrypoint)
    # resolver: Cloud Run uses Google DNS; required when proxy_pass target is a
    # hostname variable (prevents "no resolver defined" errors at runtime).
    # proxy_ssl_server_name: send correct SNI for the HTTPS upstream.
    resolver 8.8.8.8 8.8.4.4 valid=30s ipv6=off;
    set $backend BACKEND_URL_PLACEHOLDER;

    location /api/ {
        proxy_pass $backend;
        proxy_ssl_server_name on;
        proxy_ssl_name BACKEND_HOST_PLACEHOLDER;
        proxy_set_header Host BACKEND_HOST_PLACEHOLDER;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        # Don't buffer large model responses
        proxy_buffering off;
    }

    # Aggressively cache hashed static assets (Vite adds content hash to filenames)
    location ~* \.(js|css|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Health check for Cloud Run (no logs)
    location /health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}

